apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # these are replica set labels
  labels:
    purpose: rs-demo
    project: roboshop
spec:
  replicas: 10
  selector:
    # these labels are used to select pods
    matchLabels:
      purpose: rs-demo
      project: roboshop
  # pod definition(means for whom you are adding replicas?below)
  #You are adding "replicas" for the Pod defined inside template section.
  template:
    metadata:
      labels:
        purpose: rs-demo
        project: roboshop
    spec:
      containers:
      - name: nginx
        image: nginx:trixie-perl